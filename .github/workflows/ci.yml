name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: binate

      - uses: actions/checkout@v4
        with:
          repository: binate/bootstrap
          path: bootstrap

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Unit tests (boot, boot-comp, boot-comp-int)
        run: binate/scripts/unittest/run.sh basic

      - name: Conformance tests (boot, boot-comp, boot-comp-int)
        run: binate/conformance/run.sh basic

      # TODO: boot-comp-comp has string corruption on x86-64 Linux — investigate
      # The gen1 compiler produces garbage filenames when calling clang.
      # Likely related to sret or @[]char handling on x86-64.
