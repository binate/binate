name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Read mode list from scripts/modesets/all — single source of truth
  modes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          modes=$(grep -v '^#' scripts/modesets/all | grep -v '^$' | jq -R . | jq -s .)
          echo "matrix={\"mode\":$modes}" >> "$GITHUB_OUTPUT"

  # Run unit tests and conformance tests in parallel per mode
  test:
    needs: modes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.modes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: binate

      - uses: actions/checkout@v4
        with:
          repository: binate/bootstrap
          path: bootstrap

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Unit tests (${{ matrix.mode }})
        run: binate/scripts/unittest/run.sh -v ${{ matrix.mode }}

      - name: Conformance tests (${{ matrix.mode }})
        run: binate/conformance/run.sh -v ${{ matrix.mode }}
