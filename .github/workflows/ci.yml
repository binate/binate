name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: binate

      - uses: actions/checkout@v4
        with:
          repository: binate/bootstrap
          path: bootstrap

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Unit tests (boot, boot-comp, boot-comp-int)
        run: binate/scripts/unittest/run.sh basic

      - name: Conformance tests (boot, boot-comp, boot-comp-int)
        run: binate/conformance/run.sh basic

      - name: Unit tests (boot-comp-comp, boot-comp-comp-comp)
        run: binate/scripts/unittest/run.sh boot-comp-comp && binate/scripts/unittest/run.sh boot-comp-comp-comp

      - name: Conformance tests (boot-comp-comp, boot-comp-comp-comp)
        run: binate/conformance/run.sh boot-comp-comp && binate/conformance/run.sh boot-comp-comp-comp
