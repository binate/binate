name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          path: binate

      - uses: actions/checkout@v4
        with:
          repository: binate/bootstrap
          path: bootstrap

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      # boot: bootstrap interpreter runs tests directly
      # boot-comp: bootstrap interprets compiler, which compiles and runs tests
      # Deeper modes (boot-comp-int, boot-comp-comp, etc.) have known segfaults
      # on Linux/x86_64 that need investigation.
      - name: Unit tests (boot)
        run: binate/scripts/unittest/run.sh boot

      - name: Unit tests (boot-comp)
        run: binate/scripts/unittest/run.sh boot-comp

      - name: Conformance tests (boot)
        run: binate/conformance/run.sh boot

      - name: Conformance tests (boot-comp)
        run: binate/conformance/run.sh boot-comp
