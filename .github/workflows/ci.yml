name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: binate

      - uses: actions/checkout@v4
        with:
          repository: binate/bootstrap
          path: bootstrap

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Unit tests (all)
        run: binate/scripts/unittest/run.sh all

      - name: Conformance tests (all)
        run: binate/conformance/run.sh all
